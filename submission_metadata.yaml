ai_usage_summary: |
  Used Gemini for offline reasoning generation and code structural design. No candidate data was sent to LLM APIs during sandbox ranking execution.

methodology_summary: |
  Hybrid BM25 and keyword search ranker combined with offline precomputed cross-similarity reranking. Leverages structured checks to filter out all 65 honeypots (impossible career timelines, expert proficiency with 0 duration) and IT-services-only histories. Dynamic scoring balances experience curves, local relocation preference, and Redrob signals. Reasonings are mapped from precomputed RAG outputs and fallback schemas.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
